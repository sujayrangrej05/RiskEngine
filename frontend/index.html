<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RiskEngine Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist-min@2.30.0"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">RiskEngine</a>
    </div>
  </nav>

  <div class="container">
    <div class="row mb-4 align-items-center">
      <div class="col">
        <h1 class="h3 mb-0">Basel III Market Risk Dashboard</h1>
      </div>
      <div class="col-auto">
        <button id="runBtn" class="btn btn-primary">Run Analysis</button>
      </div>
    </div>

    <!-- KPI Cards -->
    <div id="summary" class="row g-3"></div>

    <!-- Charts -->
    <div class="row g-4 mt-3">
      <div class="col-12">
        <div class="card h-100">
          <div class="card-header h5 mb-0">Loss Distribution</div>
          <div class="card-body p-0">
            <div id="lossChart" class="chart"></div>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="card h-100">
          <div class="card-header h5 mb-0">VaR &amp; ES Comparison</div>
          <div class="card-body p-0">
            <div id="varChart" class="chart"></div>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="card h-100">
          <div class="card-header h5 mb-0">Gaussian Copula Comparison</div>
          <div class="card-body p-0">
            <div id="copulaChart" class="chart"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="mt-3 text-center text-muted"></div>
  </div>

  <!-- Spinner overlay -->
  <div id="spinnerOverlay">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div>
      <div class="mt-2">Running analysis…</div>
    </div>
  </div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const summaryDiv = document.getElementById('summary');
    const statusDiv = document.getElementById('status');
    const spinner = document.getElementById('spinnerOverlay');

    function showSpinner(show) {
      spinner.style.display = show ? 'flex' : 'none';
    }

    runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      statusDiv.textContent = '';
      showSpinner(true);
      try {
        const res = await fetch('/api/run');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();

        const cards = [
          {label:'VaR Historical (99%)', value:`₹${(data.var_historical_99/1e5).toFixed(2)}L`},
          {label:'VaR Monte Carlo (99%)', value:`₹${(data.var_montecarlo_99/1e5).toFixed(2)}L`},
          {label:'Expected Shortfall (99% MC)', value:`₹${(data.es_montecarlo_99/1e5).toFixed(2)}L`},
          {label:'Copula VaR (99%)', value:`₹${(data.copula_var_99/1e5).toFixed(2)}L`},
          {label:'Tail Amplification', value:`${data.tail_amplification.toFixed(2)}%`},
          {label:'Backtest Exceptions', value:`${data.backtest_exceptions}/${data.backtest_observations}`},
          {label:'Basel Zone', value:`${data.basel_zone}`},
          {label:'Kupiec p‑value', value:`${data.kupiec_pvalue}`},
        ];
        summaryDiv.innerHTML = cards.map(c => `
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card p-2 h-100">
              <div class="kpi-label">${c.label}</div>
              <p class="kpi-value mb-0">${c.value}</p>
            </div>
          </div>
        `).join('');

        // Render charts
        Plotly.react('lossChart', JSON.parse(data.loss_distribution));
        if (data.var_comparison) Plotly.react('varChart', JSON.parse(data.var_comparison));
        if (data.copula_comparison) Plotly.react('copulaChart', JSON.parse(data.copula_comparison));

        statusDiv.textContent = 'Analysis complete.';
      } catch (e) {
        statusDiv.textContent = 'Error: ' + e.message;
      } finally {
        runBtn.disabled = false;
        showSpinner(false);
      }
    });
  </script>
</body>
</html>
